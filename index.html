<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebXR Hand Physics - Full Code</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
    
    <script src="https://unpkg.com/aframe-environment-component@1.3.5/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene physics="debug: false; gravity: -9.8">
      
      <a-entity environment="preset: dream; groundColor: #222; grid: dots"></a-entity>

      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="directional" position="1 1 1" intensity="0.8"></a-camera>

      <a-box static-body 
             position="0 0.8 -0.7" 
             width="1.5" height="0.1" depth="0.8" 
             color="#444"></a-box>

      <a-box dynamic-body="mass: 1" 
             position="-0.3 1 -0.6" 
             scale="0.15 0.15 0.15" 
             color="#EF2D5E"></a-box>

      <a-cone dynamic-body="mass: 1" 
              position="0 1 -0.6" 
              scale="0.15 0.2 0.15" 
              segments-radial="3" 
              color="#FFC65D"></a-cone>

      <a-sphere dynamic-body="mass: 1" 
                position="0.3 1 -0.6" 
                radius="0.08" 
                color="#4CC3D9"></a-sphere>

      <a-plane static-body 
               rotation="-90 0 0" 
               width="20" height="20" 
               visible="false"></a-plane>

      <a-entity id="leftHand" 
                hand-tracking-controls="hand: left" 
                static-body="shape: sphere; sphereRadius: 0.02">
      </a-entity>

      <a-entity id="rightHand" 
                hand-tracking-controls="hand: right" 
                static-body="shape: sphere; sphereRadius: 0.02">
      </a-entity>

      <a-entity id="rig" position="0 0 0">
        <a-camera position="0 1.6 0" look-controls wasd-controls></a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
