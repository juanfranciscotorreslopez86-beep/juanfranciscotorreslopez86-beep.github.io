<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR - Manos Fijas y Movimiento Terrestre</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>
    <a-scene physics="debug: false; gravity: -9.8;" fog="type: exponential; color: #1a1a1a; density: 0.05">
      
      <a-sky color="#1a1a1a"></a-sky>
      <a-light type="ambient" intensity="0.6"></a-light>
      <a-light type="directional" position="1 5 2" intensity="0.5"></a-light>

      <a-plane static-body 
               rotation="-90 0 0" 
               width="50" height="50" 
               src="https://cdn.jsdelivr.net/gh/aframevr/sample-assets@master/assets/images/grid.png"
               repeat="50 50"
               material="roughness: 1; metalness: 0">
      </a-plane>

      <a-box id="mesa" 
             static-body 
             position="0 0.8 -0.8" 
             width="1.5" height="0.1" depth="0.8" 
             color="#444">
      </a-box>

      <a-box class="grabbable" dynamic-body="mass: 1; linearDamping: 0.5" position="-0.2 1 -0.7" scale="0.1 0.1 0.1" color="red"></a-box>
      <a-sphere class="grabbable" dynamic-body="mass: 1; linearDamping: 0.5" position="0 1 -0.7" radius="0.06" color="blue"></a-sphere>
      <a-cone class="grabbable" dynamic-body="mass: 1; linearDamping: 0.5" position="0.2 1 -0.7" radius-bottom="0.06" height="0.12" color="yellow"></a-cone>

      <a-entity id="rig" position="0 0 0">
        <a-camera id="head" look-controls position="0 1.6 0"></a-camera>
        
        <a-entity id="leftHand" 
                  hand-tracking-controls="hand: left"
                  oculus-touch-controls="hand: left">
                  <a-sphere radius="0.03" color="white" opacity="0.4"></a-sphere>
        </a-entity>

        <a-entity id="rightHand" 
                  hand-tracking-controls="hand: right"
                  oculus-touch-controls="hand: right">
                  <a-sphere radius="0.03" color="white" opacity="0.4"></a-sphere>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      const rig = document.getElementById('rig');
      const camera = document.getElementById('head');
      const moveSpeed = 0.04;
      
      let grabbedObj = null;
      let activeHand = null;

      // --- MOVIMIENTO TERRESTRE (SIN VOLAR) ---
      // Usamos el joystick izquierdo para mover el rig
      document.getElementById('leftHand').addEventListener('thumbstickmoved', (e) => {
        const rotation = camera.getAttribute('rotation');
        // Convertimos grados a radianes
        const angle = rotation.y * Math.PI / 180;

        // Calculamos dirección X y Z basándonos solo en la rotación Y (cabeza)
        // Esto evita que "volemos" si miramos hacia arriba
        const forward = -e.detail.y * moveSpeed;
        const side = e.detail.x * moveSpeed;

        const pos = rig.getAttribute('position');
        
        // Matemáticas de rotación para que "adelante" sea hacia donde miras
        pos.x += side * Math.cos(angle) + forward * Math.sin(angle);
        pos.z += side * Math.sin(angle) - forward * Math.cos(angle);
        
        // Mantenemos pos.y intacto para no despegar del suelo
        rig.setAttribute('position', pos);
      });

      // --- LÓGICA DE AGARRE (GRAB) ---
      function onGrab(evt) {
        if (grabbedObj) return;
        const hand = evt.target;
        const items = document.querySelectorAll('.grabbable');
        
        items.forEach(item => {
          // Calculamos distancia entre la mano y el objeto
          const dist = hand.object3D.position.distanceTo(item.object3D.position);
          if (dist < 0.25) {
            grabbedObj = item;
            activeHand = hand;
            // Quitamos física para que no luche contra la mesa mientras lo sujetas
            grabbedObj.removeAttribute('dynamic-body');
          }
        });
      }

      function onRelease() {
        if (grabbedObj) {
          // Devolvemos la física al soltarlo
          grabbedObj.setAttribute('dynamic-body', 'mass: 1; linearDamping: 0.5');
          grabbedObj = null;
          activeHand = null;
        }
      }

      // Eventos para ambas manos
      [document.getElementById('leftHand'), document.getElementById('rightHand')].forEach(h => {
        h.addEventListener('triggerdown', onGrab);
        h.addEventListener('gripdown', onGrab);
        h.addEventListener('triggerup', onRelease);
        h.addEventListener('gripup', onRelease);
      });

      // Loop de renderizado para que el objeto siga a la mano con suavidad
      function update() {
        if (grabbedObj && activeHand) {
          // Copiamos posición y rotación de la mano al objeto
          grabbedObj.object3D.position.copy(activeHand.object3D.position);
          grabbedObj.object3D.rotation.copy(activeHand.object3D.rotation);
        }
        requestAnimationFrame(update);
      }
      update();
    </script>
  </body>
</html>
