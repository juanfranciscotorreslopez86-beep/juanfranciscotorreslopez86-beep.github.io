<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Physics - Fixed Table</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
  </head>
  <body>
    <a-scene physics="debug: false; gravity: -9.8; friction: 0.1; restitution: 0.2;">
      
      <a-sky color="#1a1a1a"></a-sky>

      <a-plane static-body 
               rotation="-90 0 0" 
               width="20" height="20" 
               color="#333" 
               material="roughness: 1"></a-plane>

      <a-box id="mesa" 
             static-body="friction: 1; restitution: 0.1" 
             position="0 0.8 -0.7" 
             width="1.2" height="0.1" depth="0.7" 
             color="#444">
      </a-box>

      <a-box class="grabbable" 
             dynamic-body="mass: 1; linearDamping: 0.5; angularDamping: 0.5" 
             position="-0.2 1 -0.6" 
             scale="0.1 0.1 0.1" 
             color="red"></a-box>

      <a-sphere class="grabbable" 
                dynamic-body="mass: 1; linearDamping: 0.5; angularDamping: 0.5" 
                position="0 1 -0.6" 
                radius="0.06" 
                color="blue"></a-sphere>

      <a-cone class="grabbable" 
              dynamic-body="mass: 1; linearDamping: 0.5; angularDamping: 0.5" 
              position="0.2 1 -0.6" 
              radius-bottom="0.06" height="0.12" 
              color="yellow"></a-cone>

      <a-entity id="rig" position="0 0 0">
        <a-camera position="0 1.6 0" look-controls></a-camera>
        
        <a-entity id="leftHand" 
                  hand-tracking-controls="hand: left"
                  oculus-touch-controls="hand: left">
                  <a-sphere radius="0.05" opacity="0.3" color="white"></a-sphere>
        </a-entity>

        <a-entity id="rightHand" 
                  hand-tracking-controls="hand: right"
                  oculus-touch-controls="hand: right">
                  <a-sphere radius="0.05" opacity="0.3" color="white"></a-sphere>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      const rig = document.getElementById('rig');
      const moveSpeed = 0.05;
      let grabbedObj = null;
      let currentHand = null;

      // Movimiento con Joystick Izquierdo
      document.getElementById('leftHand').addEventListener('thumbstickmoved', (e) => {
        const camera = document.querySelector('a-camera');
        const angle = camera.getAttribute('rotation').y * Math.PI / 180;
        
        const forward = -e.detail.y * moveSpeed;
        const side = e.detail.x * moveSpeed;

        const pos = rig.getAttribute('position');
        pos.x += side * Math.cos(angle) + forward * Math.sin(angle);
        pos.z += side * Math.sin(angle) - forward * Math.cos(angle);
        rig.setAttribute('position', pos);
      });

      // Lógica de agarre optimizada
      function grab(evt) {
        if (grabbedObj) return;
        const hand = evt.target;
        const items = document.querySelectorAll('.grabbable');
        
        items.forEach(item => {
          const dist = hand.object3D.position.distanceTo(item.object3D.position);
          if (dist < 0.2) {
            grabbedObj = item;
            currentHand = hand;
            // IMPORTANTE: Quitamos el cuerpo dinámico mientras lo sostenemos
            // para que no haya conflictos de colisión con la mesa o la mano
            grabbedObj.removeAttribute('dynamic-body'); 
          }
        });
      }

      function release() {
        if (grabbedObj) {
          // Re-añadimos la física al soltar
          grabbedObj.setAttribute('dynamic-body', 'mass: 1; linearDamping: 0.5; angularDamping: 0.5');
          grabbedObj = null;
          currentHand = null;
        }
      }

      const hands = [document.getElementById('leftHand'), document.getElementById('rightHand')];
      hands.forEach(h => {
        h.addEventListener('triggerdown', grab);
        h.addEventListener('gripdown', grab);
        h.addEventListener('triggerup', release);
        h.addEventListener('gripup', release);
      });

      function loop() {
        if (grabbedObj && currentHand) {
          // El objeto sigue a la mano de forma suave
          grabbedObj.object3D.position.copy(currentHand.object3D.position);
          grabbedObj.object3D.rotation.copy(currentHand.object3D.rotation);
        }
        requestAnimationFrame(loop);
      }
      loop();
    </script>
  </body>
</html>
